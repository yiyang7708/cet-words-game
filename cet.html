        const nextBtn = document.getElementById('nextBtn');
        const totalCount = document.getElementById('totalCount');
        const correctCount = document.getElementById('correctCount');
        const wrongCount = document.getElementById('wrongCount');
        const accuracyRate = document.getElementById('accuracyRate');
        const wrongWordsContainer = document.getElementById('wrongWordsContainer');
        const wrongWordsCount = document.getElementById('wrongWordsCount');
        const gameOverModal = document.getElementById('gameOverModal');
        const modalTotal = document.getElementById('modalTotal');
        const modalAccuracy = document.getElementById('modalAccuracy');
        const restartBtn = document.getElementById('restartBtn');
        const resetBtn = document.getElementById('resetBtn');
        const modeToggle = document.getElementById('modeToggle');

        // 初始化单词队列
        function initWordQueue() {
            gameState.wordQueue = [...wordList];
            gameState.usedWords = [];
            gameState.wrongWords = [];
        }

        // 获取随机单词
        function getRandomWord() {
            if (gameState.wordQueue.length === 0) {
                if (gameState.usedWords.length === 0) return null;
                gameState.wordQueue = [...gameState.usedWords];
                gameState.usedWords = [];
            }
            
            const randomIndex = Math.floor(Math.random() * gameState.wordQueue.length);
            const word = gameState.wordQueue.splice(randomIndex, 1)[0];
            gameState.usedWords.push(word);
            return word;
        }

        // 生成选项
        function generateOptions(correctWord) {
            const options = [correctWord.translation];
            
            // 生成3个错误选项
            while (options.length < 4) {
                const randomWord = wordList[Math.floor(Math.random() * wordList.length)];
                if (!options.includes(randomWord.translation) && randomWord.word !== correctWord.word) {
                    options.push(randomWord.translation);
                }
            }
            
            // 打乱选项顺序
            return options.sort(() => Math.random() - 0.5);
        }

        // 显示当前单词
        function displayWord() {
            if (gameState.wordQueue.length === 0 && gameState.usedWords.length === wordList.length) {
                endGame();
                return;
            }

            gameState.currentWord = getRandomWord();
            wordDisplay.textContent = gameState.currentWord.word;
            hint.textContent = '请选择正确的中文意思';
            
            const options = generateOptions(gameState.currentWord);
            
            optionBtns.forEach((btn, index) => {
                btn.textContent = options[index];
                btn.classList.remove('border-success', 'border-danger', 'border-primary');
                btn.classList.add('border-gray-200', 'dark:border-gray-700');
                btn.disabled = false;
            });
        }

        // 检查答案
        function checkAnswer(selectedIndex) {
            const selectedTranslation = optionBtns[selectedIndex].textContent;
            const isCorrect = selectedTranslation === gameState.currentWord.translation;
            
            gameState.total++;
            
            if (isCorrect) {
                gameState.correct++;
                optionBtns[selectedIndex].classList.remove('border-gray-200', 'dark:border-gray-700');
                optionBtns[selectedIndex].classList.add('border-success');
                hint.textContent = '✅ 回答正确！';
            } else {
                gameState.wrong++;
                optionBtns[selectedIndex].classList.remove('border-gray-200', 'dark:border-gray-700');
                optionBtns[selectedIndex].classList.add('border-danger');
                
                // 显示正确答案
                optionBtns.forEach(btn => {
                    if (btn.textContent === gameState.currentWord.translation) {
                        btn.classList.remove('border-gray-200', 'dark:border-gray-700');
                        btn.classList.add('border-success');
                    }
                });
                
                // 添加到错题本
                if (!gameState.wrongWords.some(item => item.word === gameState.currentWord.word)) {
                    gameState.wrongWords.push(gameState.currentWord);
                }
                
                hint.textContent = '❌ 回答错误，请看正确答案';
            }
            
            // 禁用所有按钮
            optionBtns.forEach(btn => btn.disabled = true);
            
            // 更新统计
            updateStats();
            updateWrongWords();
            
            // 显示下一题按钮
            nextBtn.classList.remove('hidden');
        }

        // 更新统计信息
        function updateStats() {
            totalCount.textContent = gameState.total;
            correctCount.textContent = gameState.correct;
            wrongCount.textContent = gameState.wrong;
            
            const accuracy = gameState.total === 0 ? 0 : Math.round((gameState.correct / gameState.total) * 100);
            accuracyRate.textContent = `${accuracy}%`;
        }

        // 更新错题本
        function updateWrongWords() {
            wrongWordsCount.textContent = `${gameState.wrongWords.length} 个错题`;
            
            if (gameState.wrongWords.length === 0) {
                wrongWordsContainer.innerHTML = '<p class="text-neutral text-center py-4">暂无错题</p>';
                return;
            }
            
            wrongWordsContainer.innerHTML = '';
            gameState.wrongWords.forEach(item => {
                const wordEl = document.createElement('div');
                wordEl.className = 'flex justify-between items-center p-2 bg-gray-50 dark:bg-gray-700 rounded';
                wordEl.innerHTML = `
                    <span class="font-medium">${item.word}</span>
                    <span class="text-neutral">${item.translation}</span>
                `;
                wrongWordsContainer.appendChild(wordEl);
            });
        }

        // 开始游戏
        function startGame() {
            gameState = {
                isPlaying: true,
                currentWord: null,
                wordQueue: [],
                usedWords: [],
                total: 0,
                correct: 0,
                wrong: 0,
                wrongWords: []
            };
            
            initWordQueue();
            updateStats();
            updateWrongWords();
            startBtn.classList.add('hidden');
            nextBtn.classList.add('hidden');
            displayWord();
        }

        // 下一题
        function nextQuestion() {
            nextBtn.classList.add('hidden');
            displayWord();
        }

        // 结束游戏
        function endGame() {
            gameState.isPlaying = false;
            const accuracy = gameState.total === 0 ? 0 : Math.round((gameState.correct / gameState.total) * 100);
            
            modalTotal.textContent = gameState.total;
            modalAccuracy.textContent = `${accuracy}%`;
            
            gameOverModal.classList.remove('hidden');
        }

        // 重置游戏
        function resetGame() {
            gameState = {
                isPlaying: false,
                currentWord: null,
                wordQueue: [],
                usedWords: [],
                total: 0,
                correct: 0,
                wrong: 0,
                wrongWords: []
            };
            
            updateStats();
            updateWrongWords();
            startBtn.classList.remove('hidden');
            nextBtn.classList.add('hidden');
            wordDisplay.textContent = '点击开始游戏';
            hint.textContent = '准备好开始记忆单词了吗？';
            
            optionBtns.forEach(btn => {
                btn.textContent = '请先开始游戏';
                btn.classList.remove('border-success', 'border-danger', 'border-primary');
                btn.classList.add('border-gray-200', 'dark:border-gray-700');
                btn.disabled = true;
            });
        }

        // 切换暗黑模式
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
        }

        // 事件监听
        startBtn.addEventListener('click', startGame);
        nextBtn.addEventListener('click', nextQuestion);
        resetBtn.addEventListener('click', resetGame);
        modeToggle.addEventListener('click', toggleDarkMode);
        restartBtn.addEventListener('click', () => {
            gameOverModal.classList.add('hidden');
            resetGame();
        });

        // 选项按钮点击事件
        optionBtns.forEach((btn, index) => {
            btn.addEventListener('click', () => {
                if (gameState.isPlaying && !btn.disabled) {
                    checkAnswer(index);
                }
            });
        });

        // 初始化暗黑模式
        if (localStorage.getItem('darkMode') === 'true') {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
